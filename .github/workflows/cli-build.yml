name: Build CLI

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - '**.md'

permissions:
  contents: read

jobs:
  build-cli:
    name: Build CLI (${{ matrix.label }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            arch: x64
            extension: ""
          - os: macos-latest
            label: macos
            arch: arm64
            extension: ""
          - os: windows-latest
            label: windows
            arch: x64
            extension: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        run: |
          version=$(awk '/^version:/{print $2}' pubspec.yaml | tr '+' '-')
          echo "VERSION=v$version" >> "$GITHUB_ENV"
        shell: bash

      - name: Set filename
        run: |
          echo "OUTFILE=flauth-cli-${{ env.VERSION }}-${{ matrix.label }}-${{ matrix.arch }}${{ matrix.extension }}" >> "$GITHUB_ENV"
        shell: bash

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get
        shell: bash

      - name: Build CLI executable
        run: |
          mkdir -p build
          dart compile exe cli/main.dart -o build/${{ env.OUTFILE }}
        shell: bash

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTFILE }}
          path: build/${{ env.OUTFILE }}
          if-no-files-found: error
