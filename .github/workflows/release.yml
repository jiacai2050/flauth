name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. v0.2.0). Leave empty to use tag name."
        required: false
        default: ""
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.41.0"

jobs:
  build-app:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact_name: flauth-linux-x86_64
            asset_extension: .tar.gz
            asset_content_type: application/gzip
          - os: windows-latest
            target: windows
            artifact_name: flauth-windows-x86_64
            asset_extension: .zip
            asset_content_type: application/zip
          # - os: macos-latest
          #   target: macos
          #   artifact_name: flauth-macos-universal
          #   asset_extension: .zip
          #   asset_content_type: application/zip
          - os: ubuntu-latest
            target: apk-universal
            artifact_name: flauth-android-universal
            asset_extension: .apk
          - os: ubuntu-latest
            target: apk-split
            artifact_name: flauth-android-split
            asset_extension: .apk

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        id: flutter-action
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev libgmime-3.0-dev

      - name: Install dependencies (Flutter)
        run: flutter pub get

      - name: Remove build id
        run: sed -i -e 's/-Wl,/-Wl,--build-id=none,/' ${{ steps.flutter-action.outputs.PUB-CACHE-PATH }}/hosted/pub.dev/jni-*/src/CMakeLists.txt

      - name: Set env(version)
        shell: bash
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "VERSION=unknown" >> $GITHUB_ENV
          fi

      - name: Setup Android Signing
        if: contains(matrix.target, 'apk')
        run: |
          echo "${{ secrets.ANDROID_KEY_PROPERTIES }}" > android/key.properties
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build Linux
        if: matrix.target == 'linux'
        run: |
          flutter build linux --release
          tar -czvf ${{ matrix.artifact_name }}-${{ env.VERSION }}${{ matrix.asset_extension }} -C build/linux/x64/release/bundle .

      - name: Build Windows
        if: matrix.target == 'windows'
        run: |
          flutter build windows --release
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath ${{ matrix.artifact_name }}-${{ env.VERSION }}${{ matrix.asset_extension }}

      - name: Build macOS
        if: matrix.target == 'macos'
        run: |
          flutter build macos --release
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/${{ matrix.artifact_name }}-${{ env.VERSION }}${{ matrix.asset_extension }}" flauth.app

      - name: Build Android (Universal)
        if: matrix.target == 'apk-universal'
        run: |
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk flauth-android-universal-${{ env.VERSION }}.apk

      - name: Build Android (Split)
        if: matrix.target == 'apk-split'
        run: |
          flutter build apk --release --split-per-abi
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk flauth-android-armeabi-v7a-${{ env.VERSION }}.apk
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk flauth-android-arm64-v8a-${{ env.VERSION }}.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk flauth-android-x86_64-${{ env.VERSION }}.apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}-${{ env.VERSION }}${{ matrix.asset_extension }}
            flauth-android-*-${{ env.VERSION }}.apk

  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            arch: x64
            extension: ""
          - os: macos-latest
            label: macos
            arch: arm64
            extension: ""
          - os: windows-latest
            label: windows
            arch: x64
            extension: ".exe"

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Set env(version)
        shell: bash
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            version=$(awk '/^version:/{print $2}' pubspec.yaml | cut -f1 -d'+')
            echo "VERSION=v$version" >> $GITHUB_ENV
          fi

      - name: Set filename
        shell: bash
        run: |
          echo "OUTFILE=flauth-cli-${{ env.VERSION }}-${{ matrix.label }}-${{ matrix.arch }}${{ matrix.extension }}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: flutter pub get
        shell: bash

      - name: Build CLI executable
        shell: bash
        run: |
          mkdir -p build
          dart compile exe cli/main.dart -DVERSION=${{ env.VERSION }} -o build/${{ env.OUTFILE }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.OUTFILE }}
          path: build/${{ env.OUTFILE }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-app, build-cli]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: List release files
        run: find release-assets -type f

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
